[build]
builder = "nixpacks"
buildCommand = "npm install && npx turbo run build --filter=web && cp -r apps/web/public apps/web/.next/standalone/apps/web/public && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static"

[deploy]
startCommand = "PORT=${PORT:-3000} HOSTNAME=0.0.0.0 node apps/web/.next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
